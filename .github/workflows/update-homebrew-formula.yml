name: Publish Release and Update Homebrew Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish (for example v0.1.0)"
        required: true
        type: string
      target_branch:
        description: "Branch to release from and merge into"
        required: true
        default: "main"
        type: string

jobs:
  publish-and-update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Validate input version
        id: version
        run: |
          version="${{ inputs.version }}"
          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$'; then
            echo "Version must look like v0.1.0"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          target_branch="${{ inputs.target_branch }}"

          if gh release view "$version" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $version already exists."
          else
            gh release create "$version" \
              --repo "${{ github.repository }}" \
              --target "$target_branch" \
              --title "$version" \
              --generate-notes
          fi

      - name: Calculate tarball SHA256 and update formula
        id: formula
        run: |
          version="${{ steps.version.outputs.version }}"
          archive_url="https://github.com/${{ github.repository }}/archive/refs/tags/${version}.tar.gz"
          tmpfile="$(mktemp)"

          curl -fsSL "$archive_url" -o "$tmpfile"
          sha="$(sha256sum "$tmpfile" | awk '{print $1}')"
          rm -f "$tmpfile"

          sed -i "s|^  homepage \".*\"|  homepage \"https://github.com/${{ github.repository }}\"|" Formula/mkdreader.rb
          sed -i "s|^  url \".*\"|  url \"$archive_url\"|" Formula/mkdreader.rb
          sed -i "s|^  sha256 \".*\"|  sha256 \"$sha\"|" Formula/mkdreader.rb

          echo "archive_url=$archive_url" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Create formula PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          commit-message: "chore(formula): update Homebrew formula for ${{ steps.version.outputs.version }}"
          branch: "ci/update-formula-${{ steps.version.outputs.version }}"
          base: ${{ inputs.target_branch }}
          delete-branch: true
          title: "chore(formula): update Homebrew formula for ${{ steps.version.outputs.version }}"
          body: |
            Automated Homebrew formula update.

            - Version: `${{ steps.version.outputs.version }}`
            - Tarball: `${{ steps.formula.outputs.archive_url }}`
            - SHA256: `${{ steps.formula.outputs.sha }}`
          add-paths: |
            Formula/mkdreader.rb

      - name: Enable auto-merge for PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch \
            --auto \
            "${{ steps.cpr.outputs.pull-request-number }}"

      - name: Workflow summary
        run: |
          if [ -n "${{ steps.cpr.outputs.pull-request-number }}" ]; then
            echo "PR #${{ steps.cpr.outputs.pull-request-number }} created/updated and auto-merge requested."
          else
            echo "No formula changes were needed."
          fi
